{% from 'macros.html' import table %}

{% extends 'base.html' %}

{% block body %}


<div style="margin: 2em;">
  <h2>Archive Stats</h2>

  <div style="float: left;">
    <h3>Database</h3>
    <p>
      {{ table(database_storage_size) }}
    </p>
    <p>
      {{ table(database_table_storage_sizes) }}
    </p>
  </div>

  <div style="display: inline-block; margin-left: 5em;">
    <h3>Filesystem</h3>

    <h4>Directory Size</h4>
    <p style="white-space: pre;">{{fs_sizes}}</p>

    <h4>File Count</h4>
    <p style="white-space: pre;">{{fs_file_counts}}</p>
  </div>
</div>
{% endblock %}
